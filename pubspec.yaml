name: wanting_apps
publish_to: none

environment:
  sdk: ^3.9.2

workspace:
  - packages/design_system
  - apps/daily_piece

dev_dependencies:
  melos: ^7.5.1

melos:
  scripts:
    analyze:
      description: Run dart analyze in all packages
      run: melos exec -c 1 -- "dart analyze ."

    format:
      description: Format all Dart files
      run: melos exec -c 1 -- "dart format ."

    format-check:
      description: Verify formatting (CI)
      run: melos exec -c 1 -- "dart format --set-exit-if-changed ."

    test:
      description: Run flutter test in all packages with tests
      run: melos exec -c 1 --flutter --dir-exists=test -- "flutter test"

    clean:
      description: Clean all packages
      run: melos exec -c 1 --flutter -- "flutter clean"

    run:dp:
      description: Run DailyPiece app
      run: melos exec -c 1 --scope=daily_piece -- "flutter run"
