name: wanting_apps
publish_to: none

environment:
  sdk: ^3.9.2

workspace:
  - packages/design_system
  - packages/design_system/example
  - apps/daily_piece
  - apps/one_line_day

dev_dependencies:
  melos: ^7.5.1

melos:
  scripts:
    analyze:
      description: Run dart analyze in all packages
      run: melos exec -c 1 -- "dart analyze ."

    format:
      description: Format all Dart files
      run: melos exec -c 1 -- "dart format ."

    format-check:
      description: Verify formatting (CI)
      run: melos exec -c 1 -- "dart format --set-exit-if-changed ."

    test:
      description: Run flutter test in all packages with tests
      run: melos exec -c 1 --flutter --dir-exists=test -- "flutter test"

    test:ci:
      description: Run tests excluding goldens (Linux runners can't match macOS baselines)
      run: melos exec -c 1 --flutter --dir-exists=test -- "flutter test --exclude-tags golden"

    test:golden:
      description: Run only golden tests (host-platform-rendered baselines)
      run: melos exec -c 1 --scope=design_system -- "flutter test --tags golden"

    test:golden-update:
      description: Regenerate golden baselines (after intentional visual changes)
      run: melos exec -c 1 --scope=design_system -- "flutter test --update-goldens --tags golden"

    clean:
      description: Clean all packages
      run: melos exec -c 1 --flutter -- "flutter clean"

    gen:
      description: Run build_runner in packages that have it (envied, freezed, etc.)
      run: melos exec -c 1 --depends-on="build_runner" -- "dart run build_runner build --delete-conflicting-outputs"

    run:dp:
      description: Run DailyPiece app
      run: melos exec -c 1 --scope=daily_piece -- "flutter run"

    run:ol:
      description: Run OneLine Day app
      run: melos exec -c 1 --scope=one_line_day -- "flutter run"

    run:ds-example:
      description: Run design_system showcase example
      run: melos exec -c 1 --scope=design_system_example -- "flutter run"
