name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow only one concurrent run per ref; cancel in-progress runs when
# a new commit is pushed to the same PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: analyze + format + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.6
          channel: stable
          cache: true

      - name: Show versions
        run: |
          flutter --version
          dart --version

      - name: Activate Melos
        run: dart pub global activate melos 7.5.1

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Seed .env files for codegen
        # CI doesn't need real secrets to compile — empty values flow
        # through envied's obfuscator just fine. Real keys live in
        # GitHub Secrets and would only be used by deploy jobs.
        run: cp apps/daily_piece/.env.example apps/daily_piece/.env

      - name: Generate code (envied / freezed / etc.)
        run: melos run gen

      - name: Format check
        run: melos run format-check

      - name: Static analysis
        run: melos run analyze

      - name: Tests (excluding goldens)
        # Goldens are baselined on macOS with bundled Pretendard; rasterization
        # differs on Linux runners, so they're run as a separate manual job.
        run: melos run test:ci
